<!DOCTYPE html>
<html lang="en">

<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOD BAZAAR</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-red-500 text-white shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-4">

            <h1 class="text-3xl font-bold">
                FOOD BAZAAR
            </h1>

            <button class="bg-white text-orange-500 px-4 py-2 rounded-lg font-semibold hover:bg-orange-100">
                Cart
            </button>

        </div>
    </nav>

    <!-- Header -->
    <section class="text-center py-10 bg-red-100">

        <h2 class="text-4xl font-bold mb-3">
            Welcome to FOOD BAZAAR
        </h2>

        <p class="text-gray-700 text-lg">
            Discover the best restaurants near you.
        </p>

    </section>

    <!-- Search -->
    <section class="max-w-6xl mx-auto mt-8 px-4">

        <input id="searchBox" type="text" placeholder="🔍 Search Restaurant or Cuisine..."
            class="w-full p-4 border rounded-lg shadow focus:outline-none focus:ring-2 focus:ring-orange-500">

    </section>

    <!-- Restaurant List -->
    <section class="max-w-6xl mx-auto mt-8 px-4">

        <div id="restaurantList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

        </div>

    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white text-center p-5 mt-10">
        © 2026 FOOD BAZAAR | Made with by Prince Sharma
    </footer>

    <script src="script.js"></script>

</body>

</html>
